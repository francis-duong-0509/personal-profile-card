<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="assets/images/profile-pic.jpg" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <title>Personal Profile Card</title>
</head>

<body>
    <main class="profile-card">
        <img class="profile-pic" src="assets/images/profile-pic.jpg" alt="Profile Picture">
        <div class="details">
            <h1 class="name">Francis Duong</h1>

            <div class="location">
                <img src="assets/location-dot-solid.svg" alt="Saigon">
                <span>Sai Gon</span>
            </div>

            <p class="description">
                Fullstack Software Engineer
            </p>

            <div class="button">
                <button class="message-button">Message</button>
                <button class="follow-button following">Follow</button>
            </div>

            <div class="skills">
                <h2>Skills</h2>
                <ul class="skills-list">
                    <li>HTML5 & CSS 3</li>
                    <li>Javascript/Typescript</li>
                    <li>Bootstrap</li>
                    <li>AJAX</li>
                    <li>ReactJS</li>
                    <li>NextJS</li>
                    <li>NodeJS</li>
                    <li>NestJS</li>
                    <li>PHP</li>
                    <li>Laravel</li>
                    <li>Docker</li>
                </ul>
            </div>
        </div>
    </main>
</body>

</html>
